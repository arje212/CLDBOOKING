{% load pwa %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Dashboard{% endblock %}</title>

  <!-- PWA Meta Tags -->
  {% progressive_web_app_meta %}

  <!-- Styles & Scripts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css' rel='stylesheet' />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
</head>
<body class="bg-slate-50">

  {% if messages %}
    <div class="max-w-5xl mx-auto p-2">
    {% for m in messages %}
      <div class="p-2 my-2 rounded text-white {% if m.tags == 'error' %}bg-red-500{% else %}bg-emerald-600{% endif %}">{{ m }}</div>
    {% endfor %}
    </div>
  {% endif %}

  {% block content %}{% endblock %}

  <!-- PWA: Register Service Worker + Install Prompt -->
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/serviceworker.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW registration failed:', err));
      });
    }

    // Add to Home Screen prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      const banner = document.getElementById('pwa-install-banner');
      if (banner) banner.style.display = 'flex';
    });

    function installPWA() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(choice => {
        deferredPrompt = null;
        const banner = document.getElementById('pwa-install-banner');
        if (banner) banner.style.display = 'none';
      });
    }

    function dismissInstall() {
      const banner = document.getElementById('pwa-install-banner');
      if (banner) banner.style.display = 'none';
    }

    // Request Push Notification permission
    if ('Notification' in window && Notification.permission === 'default') {
      setTimeout(() => Notification.requestPermission(), 3000);
    }
  </script>

  <!-- PWA Install Banner -->
  <div id="pwa-install-banner" style="
    display: none;
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #4f46e5;
    color: white;
    padding: 12px 20px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    z-index: 9999;
    align-items: center;
    gap: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    max-width: 90vw;
  ">
    <span>📱 Install TrainRoom as an app?</span>
    <button onclick="installPWA()" style="
      background: white;
      color: #4f46e5;
      border: none;
      padding: 6px 14px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
    ">Install</button>
    <button onclick="dismissInstall()" style="
      background: rgba(255,255,255,0.2);
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    ">✕</button>
  </div>

</body>
</html>
